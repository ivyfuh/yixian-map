<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>逸仙段開發管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg: #0b1420;
  --bg2: #0d1a2d;
  --bg3: #111f35;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e2e8f0;
  --text2: #7a90a8;
  --text3: #3d5068;
  --accent: #1d6fa4;
  --accent2: #22d3ee;
  --green: #4ade80; --green-bg: rgba(74,222,128,0.08); --green-border: rgba(74,222,128,0.25);
  --yellow: #facc15; --yellow-bg: rgba(250,204,21,0.08); --yellow-border: rgba(250,204,21,0.25);
  --red: #f87171; --red-bg: rgba(248,113,113,0.08); --red-border: rgba(248,113,113,0.25);
  --font: 'Noto Sans TC', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }

/* ── TOP BAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 52px;
  background: rgba(11,20,32,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; }
.logo-text { font-size: 13px; font-weight: 500; color: var(--text); }
.logo-sub { font-size: 10px; color: var(--text2); margin-top: 1px; }
.topbar-stats { display: flex; gap: 16px; align-items: center; }
.stat-item { display: flex; align-items: center; gap: 5px; font-size: 12px; }
.stat-dot { width: 6px; height: 6px; border-radius: 50%; }
.stat-val { font-weight: 500; }
.stat-lbl { color: var(--text2); }
.prog-wrap { display: flex; align-items: center; gap: 8px; padding-left: 16px; border-left: 1px solid var(--border); }
.prog-track { width: 80px; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--green), var(--accent2)); transition: width 0.5s ease; }
.prog-pct { font-size: 12px; font-weight: 500; color: var(--accent2); min-width: 32px; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab { padding: 5px 12px; font-size: 12px; border-radius: 20px; border: 1px solid transparent; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; font-family: var(--font); }
.nav-tab:hover { color: var(--text); background: var(--bg3); }
.nav-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

/* ── LAYOUT ── */
.app { display: flex; height: 100vh; padding-top: 52px; }
.map-panel { flex: 1; overflow-y: auto; padding: 20px; }
.side-panel { width: 300px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; transition: transform 0.3s ease; }

/* ── PAGE VIEWS ── */
.page { display: none; }
.page.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
#page-map { flex-direction: row; }
#page-stats { padding: 20px; overflow-y: auto; }
#page-records { padding: 20px; overflow-y: auto; }

/* ── SECTION ── */
.section { margin-bottom: 20px; }
.sec-title {
  font-size: 10px; font-weight: 500; color: var(--text3);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 8px; padding-left: 2px;
  display: flex; align-items: center; gap: 6px;
}
.sec-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.addr-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 4px; }
.grid-447 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 4px; }

/* ── ADDRESS BLOCK ── */
.ab {
  cursor: pointer; border-radius: 7px; padding: 6px 9px;
  border: 1px solid transparent; transition: all 0.15s;
  position: relative; min-width: 82px;
}
.ab:hover { transform: translateY(-2px); }
.ab.active { box-shadow: 0 0 0 2px var(--accent2); }
.ab.signed { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.ab.partial { background: var(--yellow-bg); border-color: var(--yellow-border); color: var(--yellow); }
.ab.unsigned { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
.ab-name { font-size: 10px; font-weight: 500; white-space: nowrap; margin-bottom: 4px; }
.ab-bar { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
.ab-fill { height: 100%; border-radius: 2px; }
.ab.signed .ab-fill { background: var(--green); }
.ab.partial .ab-fill { background: var(--yellow); }
.ab.unsigned .ab-fill { background: var(--red); }
.ab-ratio { position: absolute; top: -7px; right: -5px; background: var(--bg); border: 1px solid var(--border2); border-radius: 9px; font-size: 9px; padding: 1px 5px; color: var(--text2); }

/* ── SIDE PANEL ── */
.panel-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--text3); }
.panel-empty i { font-size: 36px; }
.panel-empty span { font-size: 12px; }
.panel-head { padding: 16px; border-bottom: 1px solid var(--border); }
.panel-addr { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
.panel-sub { font-size: 11px; color: var(--text2); }
.panel-body { flex: 1; overflow-y: auto; padding: 12px; }
.owner-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; }
.owner-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.owner-name { font-size: 12px; font-weight: 500; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
.badge.signed { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
.badge.partial { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow-border); }
.badge.unsigned { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
.owner-info { font-size: 11px; color: var(--text2); line-height: 2; }
.owner-info span { color: var(--text); }
.query-btn { display: flex; align-items: center; gap: 5px; width: 100%; margin-top: 7px; padding: 5px 8px; background: rgba(29,111,164,0.15); border: 1px solid rgba(29,111,164,0.3); border-radius: 6px; font-size: 11px; color: #60b4d8; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
.query-btn:hover { background: rgba(29,111,164,0.25); }
.panel-foot { padding: 12px; border-top: 1px solid var(--border); }
.foot-label { font-size: 10px; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
select, textarea, input { width: 100%; font-size: 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border2); border-radius: 7px; padding: 7px 10px; font-family: var(--font); outline: none; transition: border-color 0.15s; }
select:focus, textarea:focus, input:focus { border-color: var(--accent); }
textarea { height: 64px; resize: none; margin-top: 5px; }
.btn-save { width: 100%; padding: 8px; font-size: 12px; font-weight: 500; background: var(--accent); color: white; border: none; border-radius: 7px; cursor: pointer; margin-top: 8px; font-family: var(--font); transition: background 0.15s; display: flex; align-items: center; justify-content: center; gap: 5px; }
.btn-save:hover { background: #1a5e8a; }
.divider { height: 1px; background: var(--border); margin: 10px 0; }
.hist-title { font-size: 10px; color: var(--text2); font-weight: 500; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.hist-item { font-size: 11px; padding: 7px 0; border-top: 1px solid var(--border); line-height: 1.7; }
.hist-time { font-size: 10px; color: var(--text3); }
.hist-agent { color: var(--accent2); }
.hist-note { color: var(--text2); margin-top: 2px; }
.hist-status { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-top: 2px; }

/* ── LOADING ── */
.loading { display: flex; align-items: center; justify-content: center; flex: 1; gap: 10px; color: var(--text2); font-size: 13px; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent2); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STATS PAGE ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.stat-card-label { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
.stat-card-value { font-size: 26px; font-weight: 300; }
.stat-card-sub { font-size: 11px; color: var(--text2); margin-top: 4px; }
.stat-card.green .stat-card-value { color: var(--green); }
.stat-card.yellow .stat-card-value { color: var(--yellow); }
.stat-card.red .stat-card-value { color: var(--red); }
.stat-card.blue .stat-card-value { color: var(--accent2); }
.progress-detail { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.pd-label { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
.pd-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
.pd-name { width: 80px; color: var(--text2); flex-shrink: 0; }
.pd-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.pd-bar { height: 100%; border-radius: 3px; }
.pd-val { width: 60px; text-align: right; color: var(--text); }

/* ── RECORDS PAGE ── */
.records-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.records-table th { text-align: left; padding: 8px 12px; color: var(--text2); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; }
.records-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text); }
.records-table tr:hover td { background: var(--bg2); }
.page-title { font-size: 16px; font-weight: 500; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .topbar-stats { display: none; }
  .side-panel { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; height: 70vh; border-left: none; border-top: 1px solid var(--border); transform: translateY(100%); z-index: 50; border-radius: 16px 16px 0 0; }
  .side-panel.open { transform: translateY(0); }
  .map-panel { padding: 14px; }
  .ab { min-width: 72px; }
  .grid-447 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .logo-sub { display: none; }
  .nav-tabs { display: none; }
  .mobile-nav { display: flex !important; }
}

/* Mobile bottom nav */
.mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); padding: 8px 0 env(safe-area-inset-bottom); z-index: 60; }
.mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--text2); font-size: 10px; padding: 4px 0; }
.mobile-nav-item i { font-size: 20px; }
.mobile-nav-item.active { color: var(--accent2); }
.mobile-close { display: none; }
@media (max-width: 768px) {
  .app { padding-bottom: 56px; }
  .mobile-close { display: flex; justify-content: center; padding: 10px; cursor: pointer; }
  .mobile-close-bar { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; }
  #page-map { flex-direction: column; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-building-estate"></i></div>
    <div>
      <div class="logo-text">逸仙段開發管理系統</div>
      <div class="logo-sub">臺北市信義區逸仙段三小段</div>
    </div>
  </div>
  <div class="topbar-stats">
    <div class="stat-item"><div class="stat-dot" style="background:var(--green)"></div><span class="stat-val" id="s-signed">-</span><span class="stat-lbl">已簽約</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--yellow)"></div><span class="stat-val" id="s-partial">-</span><span class="stat-lbl">有意願</span></div>
    <div class="stat-item"><div class="stat-dot" style="background:var(--red)"></div><span class="stat-val" id="s-unsigned">-</span><span class="stat-lbl">未簽約</span></div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <div class="prog-pct" id="prog-pct">0%</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('map')"><i class="ti ti-map-2"></i> 地圖</button>
    <button class="nav-tab" onclick="showPage('stats')"><i class="ti ti-chart-pie"></i> 統計</button>
    <button class="nav-tab" onclick="showPage('records')"><i class="ti ti-notes"></i> 紀錄</button>
  </div>
</div>

<!-- APP -->
<div class="app">

  <!-- MAP PAGE -->
  <div id="page-map" class="page active">
    <div class="map-panel" id="map-panel">
      <div class="loading" id="loading"><div class="spinner"></div>載入資料中...</div>
    </div>
    <div class="side-panel" id="side-panel">
      <div class="mobile-close" onclick="closePanel()"><div class="mobile-close-bar"></div></div>
      <div class="panel-empty" id="panel-empty"><i class="ti ti-hand-click"></i><span>點選地址查看詳情</span></div>
      <div id="panel-content" style="display:none;flex-direction:column;height:100%;">
        <div class="panel-head">
          <div class="panel-addr" id="p-addr"></div>
          <div class="panel-sub" id="p-sub"></div>
        </div>
        <div class="panel-body" id="p-body"></div>
        <div class="panel-foot">
          <div class="foot-label">更新簽約狀態</div>
          <select id="status-sel">
            <option value="已簽約">已簽約</option>
            <option value="有意願">有意願</option>
            <option value="未簽約">未簽約</option>
          </select>
          <div class="foot-label" style="margin-top:10px;">業務人員姓名</div>
          <input type="text" id="agent-name" placeholder="請輸入姓名">
          <div class="foot-label" style="margin-top:10px;">拜訪紀錄</div>
          <textarea id="visit-note" placeholder="輸入本次拜訪狀況、屋主反應..."></textarea>
          <button class="btn-save" onclick="saveRecord()"><i class="ti ti-device-floppy"></i>儲存紀錄</button>
          <div class="divider"></div>
          <div id="hist-wrap"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS PAGE -->
  <div id="page-stats" class="page">
    <div class="page-title"><i class="ti ti-chart-pie" style="color:var(--accent2)"></i>簽約統計</div>
    <div class="stats-grid" id="stats-cards"></div>
    <div class="progress-detail">
      <div class="pd-label">各項目進度</div>
      <div id="pd-rows"></div>
    </div>
  </div>

  <!-- RECORDS PAGE -->
  <div id="page-records" class="page">
    <div class="page-title"><i class="ti ti-notes" style="color:var(--accent2)"></i>拜訪紀錄</div>
    <div id="records-content">
      <div class="loading"><div class="spinner"></div>載入中...</div>
    </div>
  </div>

</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <div class="mobile-nav-item active" onclick="showPage('map')"><i class="ti ti-map-2"></i><span>地圖</span></div>
  <div class="mobile-nav-item" onclick="showPage('stats')"><i class="ti ti-chart-pie"></i><span>統計</span></div>
  <div class="mobile-nav-item" onclick="showPage('records')"><i class="ti ti-notes"></i><span>紀錄</span></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzAuPGbtVF0e-jUvycfR4nT2y8x1DDq2pqUz5aiB7Sesbcz2az8CuM0XHwMRGix54yV/exec';
const QUERY_URL = 'https://ivyfuh.github.io/hanhuang-query/';
const SHEET_ID = '15LypBkwdkRGdFeR_H1N6gY04detwRYHUB9peSNG_3y8';

let DB = [];
let selectedAddr = null;

// ── FETCH DATA ──
async function loadData() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=地主清冊`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows;
    const data = rows.map(r => r.c.map(c => c ? (c.v !== null && c.v !== undefined ? String(c.v) : '') : ''));
    return data.filter((r, i) => i > 0 && r[0]);
  } catch(e) {
    console.error(e);
    return [];
  }
}

async function loadVisits() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=拜訪紀錄`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows;
    return rows.map(r => r.c.map(c => c ? (c.v || '') : '')).filter((r,i) => i > 0 && r[0]);
  } catch(e) { return []; }
}

// ── BUILD DB ──
function buildDB(rows) {
  const addrMap = {};
  rows.forEach(r => {
    const addr = r[0].trim();
    const name = r[1].trim();
    const status = r[2].trim();
    const lot = r[3].trim();
    const land = r[4].replace(/[^\d.]/g,'');
    const bld = r[5].replace(/[^\d.]/g,'');
    const totalFloor = r[6];
    const floor = r[7];
    if (!addr || !name) return;
    if (!addrMap[addr]) {
      addrMap[addr] = { addr, owners: [], hist: [] };
    }
    const existing = addrMap[addr].owners.find(o => o.name === name);
    if (!existing) {
      addrMap[addr].owners.push({ name, status, lot, land: parseFloat(land)||0, bld: parseFloat(bld)||0, totalFloor, floor });
    } else {
      if (parseFloat(land)) existing.land += parseFloat(land);
      if (parseFloat(bld)) existing.bld += parseFloat(bld);
    }
  });
  return Object.values(addrMap);
}

// ── STATUS HELPERS ──
function getGroupStatus(owners) {
  const t = owners.length;
  const s = owners.filter(o => o.status === '已簽約').length;
  const p = owners.filter(o => o.status === '有意願').length;
  if (s === t) return 'signed';
  if (s > 0 || p > 0) return 'partial';
  return 'unsigned';
}
function getPct(owners) {
  return Math.round(owners.filter(o => o.status === '已簽約').length / owners.length * 100);
}
function statusClass(s) { return s === '已簽約' ? 'signed' : s === '有意願' ? 'partial' : 'unsigned'; }
function statusText(s) { return s; }

// ── RENDER MAP ──
const LAYOUT = {
  '445號區': ['光復南路445號','光復南路445號2樓','光復南路445號3樓之1','光復南路445號4樓'],
  '445之字號': ['光復南路445之8號','光復南路445之5號','光復南路445之4號','光復南路445之2號','光復南路445之1號'],
  '443巷2號群': ['光復南路443巷2號','光復南路443巷2之1號','光復南路443巷2號3樓','光復南路443巷2號4樓'],
  '443巷4號群': ['光復南路443巷4號','光復南路443巷4號2樓','光復南路443巷4之2號','光復南路443巷4之3號'],
  '443巷6號群': ['光復南路443巷6號','光復南路443巷6之1號','光復南路443巷6號3樓','光復南路443巷6號4樓'],
  '443巷8號群': ['光復南路443巷8號','光復南路443巷8號2樓','光復南路443巷8號3樓','光復南路443巷8之3號'],
  '447號主棟': ['光復南路447號','光復南路447號2樓','光復南路447號3樓','光復南路447號4樓','光復南路447之1號'],
  '447之字排': null, // grid
};

const GRID_447 = [
  '光復南路447之7號','光復南路447之11號','光復南路447之15號','光復南路447之19號','光復南路447之23號','光復南路447之27號','光復南路447之31號','光復南路447之35號',
  '光復南路447之6號','光復南路447之10號','光復南路447之14號','光復南路447之18號','光復南路447之22號','光復南路447之26號','光復南路447之30號','光復南路447之34號',
  '光復南路447之5號','光復南路447之9號','光復南路447之13號','光復南路447之17號','光復南路447之21號','光復南路447之25號','光復南路447之29號','光復南路447之33號',
  '光復南路447之4號','光復南路447之8號','光復南路447之12號','光復南路447之16號','光復南路447之20號','光復南路447之24號','光復南路447之28號','光復南路447之32號',
];

const PURE = ['鄭素卿','中華民國(國產署)'];

function shortLabel(addr) {
  return addr.replace('光復南路','').replace('臺北市信義區','');
}

function makeBlock(entry) {
  const st = getGroupStatus(entry.owners);
  const pct = getPct(entry.owners);
  const t = entry.owners.length;
  const s = entry.owners.filter(o => o.status === '已簽約').length;
  const div = document.createElement('div');
  div.className = `ab ${st}`;
  div.dataset.addr = entry.addr;
  div.innerHTML = `${t > 1 ? `<div class="ab-ratio">${s}/${t}</div>` : ''}
    <div class="ab-name">${shortLabel(entry.addr)}</div>
    <div class="ab-bar"><div class="ab-fill" style="width:${pct}%"></div></div>`;
  div.addEventListener('click', () => selectAddr(entry.addr));
  return div;
}

function renderMap() {
  const panel = document.getElementById('map-panel');
  panel.innerHTML = '';

  const addSection = (title, addrList, isGrid) => {
    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="sec-title">${title}</div>`;
    const row = document.createElement('div');
    row.className = isGrid ? 'grid-447' : 'addr-row';
    addrList.forEach(addr => {
      const entry = DB.find(d => d.addr === addr);
      if (entry) row.appendChild(makeBlock(entry));
    });
    sec.appendChild(row);
    panel.appendChild(sec);
  };

  Object.entries(LAYOUT).forEach(([title, addrs]) => {
    if (addrs) addSection(title, addrs, false);
  });
  addSection('447之字排（4×8）', GRID_447, true);

  // Pure land
  const pureSec = document.createElement('div');
  pureSec.className = 'section';
  pureSec.innerHTML = `<div class="sec-title">純土地持有</div>`;
  const pureRow = document.createElement('div');
  pureRow.className = 'addr-row';
  PURE.forEach(addr => {
    const entry = DB.find(d => d.addr === addr);
    if (entry) pureRow.appendChild(makeBlock(entry));
  });
  pureSec.appendChild(pureRow);
  panel.appendChild(pureSec);
}

// ── SELECT ADDRESS ──
function selectAddr(addr) {
  selectedAddr = addr;
  document.querySelectorAll('.ab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll(`[data-addr="${addr}"]`).forEach(b => b.classList.add('active'));
  const entry = DB.find(d => d.addr === addr);
  if (!entry) return;

  document.getElementById('panel-empty').style.display = 'none';
  const pc = document.getElementById('panel-content');
  pc.style.display = 'flex';
  pc.style.flexDirection = 'column';
  pc.style.height = '100%';

  const signed = entry.owners.filter(o => o.status === '已簽約').length;
  document.getElementById('p-addr').textContent = entry.addr;
  document.getElementById('p-sub').textContent = `共 ${entry.owners.length} 位所有權人｜已簽約 ${signed} 位`;

  // Owner cards
  document.getElementById('p-body').innerHTML = entry.owners.map(o => `
    <div class="owner-card">
      <div class="owner-top">
        <span class="owner-name">${o.name}</span>
        <span class="badge ${statusClass(o.status)}">${o.status}</span>
      </div>
      <div class="owner-info">
        ${o.lot ? `地號：<span>${o.lot}</span>　` : ''}
        ${o.totalFloor ? `樓層：<span>${o.floor}/${o.totalFloor}樓</span>` : ''}<br>
        ${o.land ? `土地：<span>${o.land.toFixed(2)} 坪</span>　` : ''}
        ${o.bld ? `建物：<span>${o.bld.toFixed(2)} 坪</span>` : ''}
      </div>
      <button class="query-btn" onclick="openQuery('${o.name}')">
        <i class="ti ti-calculator" style="font-size:13px"></i>查詢權利價值試算
      </button>
    </div>
  `).join('');

  // Status default
  const dominantStatus = entry.owners[0]?.status || '未簽約';
  document.getElementById('status-sel').value = dominantStatus;
  document.getElementById('visit-note').value = '';

  // History
  renderHist(entry.hist);

  // Mobile open
  document.getElementById('side-panel').classList.add('open');
}

function openQuery(name) {
  window.open(`${QUERY_URL}?name=${encodeURIComponent(name)}`, '_blank');
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
}

function renderHist(hist) {
  const w = document.getElementById('hist-wrap');
  if (!hist || !hist.length) { w.innerHTML = ''; return; }
  const items = hist.slice().reverse().slice(0, 5).map(h => `
    <div class="hist-item">
      <div class="hist-time">${h[0]} <span class="hist-agent">${h[2] || ''}</span></div>
      <div class="hist-note">${h[4] || ''}</div>
      <span class="hist-status ${statusClass(h[3])}">${h[3] || ''}</span>
    </div>
  `).join('');
  w.innerHTML = `<div class="hist-title"><i class="ti ti-clock-history"></i>最近拜訪紀錄</div>${items}`;
}

// ── SAVE RECORD ──
async function saveRecord() {
  if (!selectedAddr) return;
  const status = document.getElementById('status-sel').value;
  const agent = document.getElementById('agent-name').value.trim();
  const note = document.getElementById('visit-note').value.trim();
  if (!note) { alert('請填寫拜訪紀錄'); return; }

  const btn = document.querySelector('.btn-save');
  btn.innerHTML = '<i class="ti ti-loader" style="animation:spin 0.8s linear infinite"></i>儲存中...';
  btn.disabled = true;

  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ action: 'addVisit', address: selectedAddr, agent, status, note })
    });
    // Update status locally
    const entry = DB.find(d => d.addr === selectedAddr);
    if (entry) entry.owners.forEach(o => o.status = status);
    renderMap();
    updateStats();
    selectAddr(selectedAddr);
    document.getElementById('visit-note').value = '';
    btn.innerHTML = '<i class="ti ti-check"></i>已儲存！';
    setTimeout(() => { btn.innerHTML = '<i class="ti ti-device-floppy"></i>儲存紀錄'; btn.disabled = false; }, 2000);
  } catch(e) {
    btn.innerHTML = '<i class="ti ti-device-floppy"></i>儲存紀錄';
    btn.disabled = false;
    alert('儲存失敗，請稍後再試');
  }
}

// ── STATS ──
function updateStats() {
  const uniqueAddrs = DB;
  const signed = uniqueAddrs.filter(d => getGroupStatus(d.owners) === 'signed').length;
  const partial = uniqueAddrs.filter(d => getGroupStatus(d.owners) === 'partial').length;
  const unsigned = uniqueAddrs.filter(d => getGroupStatus(d.owners) === 'unsigned').length;
  const total = uniqueAddrs.length;
  const pct = Math.round(signed / total * 100);

  document.getElementById('s-signed').textContent = signed;
  document.getElementById('s-partial').textContent = partial;
  document.getElementById('s-unsigned').textContent = unsigned;
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';

  // People stats
  const allOwners = DB.flatMap(d => d.owners);
  const uniqueNames = [...new Set(allOwners.map(o => o.name))];
  const signedPeople = [...new Set(allOwners.filter(o => o.status === '已簽約').map(o => o.name))].length;
  const totalLand = allOwners.reduce((a, o) => a + (o.land || 0), 0);
  const signedLand = allOwners.filter(o => o.status === '已簽約').reduce((a, o) => a + (o.land || 0), 0);

  document.getElementById('stats-cards').innerHTML = `
    <div class="stat-card green">
      <div class="stat-card-label">已簽約地址</div>
      <div class="stat-card-value">${signed}</div>
      <div class="stat-card-sub">共 ${total} 筆</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-card-label">有意願地址</div>
      <div class="stat-card-value">${partial}</div>
      <div class="stat-card-sub">待跟進</div>
    </div>
    <div class="stat-card red">
      <div class="stat-card-label">未簽約地址</div>
      <div class="stat-card-value">${unsigned}</div>
      <div class="stat-card-sub">需開發</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-card-label">整體進度</div>
      <div class="stat-card-value">${pct}%</div>
      <div class="stat-card-sub">以地址數計算</div>
    </div>
    <div class="stat-card green">
      <div class="stat-card-label">已簽約人數</div>
      <div class="stat-card-value">${signedPeople}</div>
      <div class="stat-card-sub">共 ${uniqueNames.length} 人</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-card-label">已簽約土地坪數</div>
      <div class="stat-card-value">${signedLand.toFixed(1)}</div>
      <div class="stat-card-sub">共 ${totalLand.toFixed(1)} 坪</div>
    </div>
  `;

  document.getElementById('pd-rows').innerHTML = [
    { label: '地址簽約', val: signed, total, color: 'var(--green)' },
    { label: '人數簽約', val: signedPeople, total: uniqueNames.length, color: 'var(--accent2)' },
    { label: '土地坪數', val: signedLand.toFixed(0), total: totalLand.toFixed(0), color: 'var(--yellow)' },
  ].map(r => `
    <div class="pd-row">
      <div class="pd-name">${r.label}</div>
      <div class="pd-bar-wrap"><div class="pd-bar" style="width:${Math.round(r.val/r.total*100)}%;background:${r.color}"></div></div>
      <div class="pd-val">${r.val} / ${r.total}</div>
    </div>
  `).join('');
}

// ── PAGE SWITCH ──
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.mobile-nav-item').forEach(t => t.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll(`.nav-tab`).forEach(t => { if (t.textContent.includes(page === 'map' ? '地圖' : page === 'stats' ? '統計' : '紀錄')) t.classList.add('active'); });
  document.querySelectorAll('.mobile-nav-item').forEach((t, i) => { if ((page === 'map' && i === 0) || (page === 'stats' && i === 1) || (page === 'records' && i === 2)) t.classList.add('active'); });

  if (page === 'records') loadRecordsPage();
}

async function loadRecordsPage() {
  const content = document.getElementById('records-content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>載入中...</div>';
  const visits = await loadVisits();
  if (!visits.length) { content.innerHTML = '<p style="color:var(--text2);font-size:13px">尚無拜訪紀錄</p>'; return; }
  content.innerHTML = `<table class="records-table">
    <thead><tr><th>時間</th><th>地址</th><th>業務</th><th>狀態</th><th>備註</th></tr></thead>
    <tbody>${visits.slice().reverse().map(r => `
      <tr>
        <td style="white-space:nowrap;color:var(--text2)">${r[0]||''}</td>
        <td>${(r[1]||'').replace('光復南路','')}</td>
        <td>${r[2]||''}</td>
        <td><span class="badge ${statusClass(r[3])}">${r[3]||''}</span></td>
        <td style="color:var(--text2)">${r[4]||''}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ── INIT ──
async function init() {
  const rows = await loadData();
  if (!rows.length) {
    document.getElementById('loading').innerHTML = '⚠️ 無法載入資料，請確認 Google Sheets 共用設定';
    return;
  }
  DB = buildDB(rows);
  renderMap();
  updateStats();
}

init();
</script>
